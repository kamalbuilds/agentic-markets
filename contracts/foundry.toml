[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@account-abstraction/=lib/account-abstraction/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
adi_testnet = "https://rpc.ab.testnet.adifoundation.ai/"
hedera_testnet = "https://testnet.hashio.io/api"
